<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="refresh" content="0; url=https://x.com/nupamo">
    <title>Redirecting to @nupamo</title>
    <link rel="canonical" href="https://x.com/nupamo">
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #000;
            color: #fff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }
        .container {
            text-align: center;
        }
        a {
            color: #1d9bf0;
            text-decoration: none;
        }
        a:hover {
            text-decoration: underline;
        }
        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid rgba(255, 255, 255, 0.1);
            border-left-color: #1d9bf0;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
    <script>
        window.location.replace("https://x.com/nupamo");
    </script>
</head>
<body>
    <div class="container">
        <div class="spinner"></div>
        <p>@nupamo 로 이동 중입니다...</p>
        <p>페이지가 이동하지 않으면 <a href="https://x.com/nupamo">여기를 클릭하세요</a>.</p>
    </div>
</body>
</html>
